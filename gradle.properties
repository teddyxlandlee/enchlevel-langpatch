changelog=3.8.0: Introduce telemetry.\n\nYou can create a config file\
  \ (`config/enchlevel-langpatch-telemetry.txt`) to configure telemetry level:\n\
  \ - `disabled`: disable telemetry\n\
  \ - `necessary`: only collect necessary data\n\
  \ - `functional`: collect functional data (default)\n\
  \ - `optional`: collect optional data
